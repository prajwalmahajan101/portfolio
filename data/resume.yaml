  - slug: optiview
    name: OptiView — Dashboard Platform
    tagline: Multi-DB dashboard engine with pooled connections, async Celery execution and audited import/export
    stack: [Django, DRF, Celery, Redis, PostgreSQL, MySQL, MongoDB]
    problem: >-
      Optimo's analyst teams were filing tickets for every new chart,
      every new data source, every new RBAC tier. Every change meant
      code, review, deploy, regression risk — and the dashboard team
      became the bottleneck for everyone else. The old pattern also
      couldn't span Postgres, MySQL and Mongo from a single config; each
      data source needed bespoke wiring.
    approach: >-
      Built OptiView as a Django + DRF platform where dashboards are
      JSON artefacts. A universal `{{param}}` query layer with type
      coercion runs across Postgres / MySQL / Mongo / SQLite from one
      config. Async Celery cards own their tasks behind retry + circuit
      breaker, with user-scoped TTL caching on the hot path. JWT
      access+refresh, Google OAuth and dashboard-level RBAC; full JSON
      dashboard export and import with dependency resolution and an
      audit trail. The analysis surface is composable — heat maps, pie
      charts and line graphs are first-class widgets, each entirely
      configurable from the admin portal. A comment section on every
      dashboard card captures analyst feedback in-line, and a frontend
      glossary surfaces definitions for domain jargon — both the
      comments and the glossary entries are managed from the admin
      portal so the dashboard team can update them without a deploy.
    result: >-
      274 commits over five months. Working as the lead, I architected a
      multi-DB platform with dashboard-level RBAC, parameterised queries,
      Celery-executed cards, configurable analysis widgets (heat maps,
      pie charts, line graphs), per-card comment feedback, an
      admin-managed jargon glossary on the frontend, and audited JSON
      import/export with 18 active branches under a proper PR-review
      workflow.
    bullets:
      - Multi-DB integration across PostgreSQL / MySQL / MongoDB / SQLite via SQLAlchemy — a single query layer reaches all four.
      - Universal `{{param}}` parameterised queries with type validation and coercion so analyst-authored SQL stays safe at runtime.
      - Async Celery card execution with per-task progress tracking and explicit task ownership — no worker can steal another's work.
      - Thread-safe pooled connections wrapped in retry + circuit breaker so a slow upstream never starves the dashboard.
      - Configurable TTL caching with user-scoped keys; per-tier rate limiting (Free / Pro / Enterprise) keeps noisy tenants honest.
      - JWT access+refresh rotation with blacklist-on-logout, Google OAuth via django-allauth, mandatory email-verified signups; dashboard-level RBAC.
      - Full JSON dashboard export and import with dependency resolution, schema validation and ImportSession/ImportLog audit trail — ship dashboards between environments cleanly.
      - Configurable analysis widgets — heat maps, pie charts, line graphs — each completely tunable from the admin portal without code changes.
      - Comment section on every dashboard card so analysts leave feedback in-line on the data they actually use.
      - Frontend glossary for domain jargon, with entries editable from the admin portal so terminology stays current without a deploy.
    architecture:
      nodes:
        - { id: analyst, label: analyst,        type: client,    hint: [-1.6,  0.0, 0] }
