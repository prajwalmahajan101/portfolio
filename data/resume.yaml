  - slug: chat
    name: Real-Time Encrypted Chat
    tagline: E2E AES-256 over horizontally-scaled WebSockets with presence + read-receipts
    stack: [Node.js, TypeScript, WebSockets, Redis Pub/Sub, MongoDB]
    problem: >-
      A typical WebSocket chat scales until one node — and then it
      doesn't, because every node needs to know about every message.
      Encryption gets bolted on later and ends up routing keys through
      the server, which defeats the point. And users expect chat to feel
      instant: presence, read-receipts and the message itself should
      land before they finish the click — even when a node has just
      restarted.
    approach: >-
      Used Redis Pub/Sub as the broker so any number of WebSocket nodes
      share message state without a single point of failure — one node
      can drop without losing the conversation. End-to-end AES-256 with
      a client-side key-exchange protocol means the server never sees
      plaintext; only the participating clients hold the session keys.
      Optimistic UI updates render the message instantly on send and
      reconcile against the server ack for sub-100ms perceived latency.
      Presence and read-receipt tracking survives node restarts because
      both states live in Redis, not in any single node's memory. Mongo
      stores only metadata for audit, not message bodies.
    result: >-
      1000+ concurrent users on a horizontally-scaled cluster with zero
      single point of failure. Sub-100ms perceived response on send.
      Messages stay private even if the server is compromised —
      ciphertext is all the server ever holds. Presence and read-receipt
      state recovers cleanly after a node restart.
    bullets:
      - Horizontally scalable WebSocket server using Redis Pub/Sub as broker — any node can drop without losing the conversation.
      - End-to-end AES-256 encryption with a client-side key-exchange protocol — the server only ever sees ciphertext.
      - Optimistic UI updates for sub-100ms perceived latency, reconciled against the server ack.
      - Presence + read-receipt tracking persisted in Redis so the state survives a node restart.
      - Mongo holds only message metadata (timestamps, audit), never plaintext message bodies.
    architecture:
      nodes:
        - { id: a,     label: client A,      type: client,    hint: [-1.5,  0.4, 0] }
        - { id: ws1,   label: ws-node-1,     type: service,   hint: [-0.4,  0.6, 0] }
        - { id: pub,   label: redis pub/sub, type: queue,     hint: [ 0.0,  0.0, 0] }
        - { id: ws2,   label: ws-node-2,     type: service,   hint: [ 0.4,  0.6, 0] }
        - { id: b,     label: client B,      type: client,    hint: [ 1.5,  0.4, 0] }
        - { id: mongo, label: mongo logs,    type: datastore, hint: [ 0.0, -0.8, 0] }
      edges:
        - { from: a,   to: ws1,   label: "e2e enc", kind: sync  }
        - { from: ws1, to: pub,   label: fanout,    kind: event }
        - { from: pub, to: ws2,   label: fanout,    kind: event }
        - { from: ws2, to: b,     label: "e2e enc", kind: sync  }
        - { from: ws1, to: mongo, label: metadata,  kind: async }
    accent: rose

