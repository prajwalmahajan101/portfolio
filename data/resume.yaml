# =============================================================================
# resume.yaml — single source of truth for portfolio content.
#
# Edit this file. RESUME.md is regenerated by `npm run resume:md`.
# src/data/resume.ts imports this file via the @rollup/plugin-yaml plugin
# (registered in vite.config.ts) and re-exports each top-level field with the
# types defined in src/data/resume.types.ts.
#
# Conventions:
#   - Multi-line prose uses YAML literal block style (|) so paragraph
#     formatting is preserved verbatim in the React app.
#   - Stable enum values (kind, type, accent) are plain strings.
#   - Numbers that are conceptually labels (phone, year, "8", "3") are
#     written as quoted strings to stay symmetric with the TS Stat interface.
# =============================================================================

