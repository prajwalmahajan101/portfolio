# -----------------------------------------------------------------------------
# Projects — Problem / Approach / Result + an architecture graph for 3D.
# -----------------------------------------------------------------------------
projects:
  - slug: co-lending
    name: Co-Lending Platform
    tagline: Five-service distributed lending gateway, built end-to-end across 30 active development days
    stack: [Django, FastAPI, React 19, AWS Lambda, PostgreSQL, Valkey, Docker, nginx]
    problem: >-
      Co-lending in India is a partner-integration problem disguised as a
      fintech product. Every lender has its own auth scheme, signing
      convention, retry expectation and webhook contract — and a single
      missed retry can mean a lost loan. Across five existing teams the
      same retry, idempotency and webhook logic was being reimplemented
      per service with subtly different bugs each time. A failure anywhere
      in the chain reached the lender as either a duplicate submission or
      a silent drop — and operations only learned about it from a partner
      email hours later.
    approach: >-
      I designed and built four of the five services from scratch — a
      Django gateway as the system of record (JWT/RBAC, Synoriq read-only
      ingestion, Synofin-via-presigned-S3 documents), an async FastAPI
      partner-push engine running BHN's five-stage flow with stages 2–5
      parallelised and an AHFC-406 recovery path, a React 19 "Heimdall"
      webapp that speaks both backends, and an AWS Lambda email-triage
      that LLM-breaks partner pushback into auto-assigned sub-queries.
      Cross-cutting machinery lives in one shared resilience kernel every
      service imports — circuit breaker, retry-with-backoff, tiered rate
      limiting, two-layer caching, outbound URL allowlist. Correctness
      invariants live in Postgres via CHECK constraints, BEFORE
      INSERT/UPDATE triggers and durable-id idempotency tables, so admin,
      shell and raw SQL paths all play by the same rules.
    result: >-
      Sole author of four of five repositories. Partner-push pipeline plus
      database-enforced idempotency cut the co-lending turnaround time
      from four hours down to five minutes. Multi-layer Redis/Valkey
      caching dropped API latency 65% and database query volume 80%; the
      circuit breaker around every partner call moved uptime from 97% to
      99.5%. CI/CD on GitHub Actions plus OIDC took deploy time from 45
      minutes to under 10, federated across each app repo via
      `repository_dispatch`. AHFC-406 turned a partner-side duplicate-
      submission rejection into an audit-honest reuse of the existing
      case ID, so partial pushes fail clean and never reach a lender twice.
    bullets:
      - Architected and built four of five services end-to-end — Django gateway, async FastAPI partner-push engine, React 19 webapp ("Heimdall"), AWS Lambda email triage — plus the Docker Compose + nginx UAT ops repo.
      - Shared resilience kernel inherited by every service — PyBreaker circuit breaker with breaker-excluded business errors, tenacity retry-with-backoff gated to 5xx, tiered Lua-backed rate limiting on Valkey, two-layer caching, outbound URL allowlist.
      - Database-enforced correctness — CHECK constraints, BEFORE INSERT/UPDATE triggers and durable-id idempotency tables — so admin, shell, `bulk_create` and raw SQL paths cannot bypass business rules.
      - "Security at the lowest layer: SSRF blocking inside the HTTP client, magic-byte content sniffing on uploads, HMAC + nonce-protected webhooks, Fernet-encrypted partner credentials, fail-closed boot on missing keys."
      - "BHN five-stage push (case → sanction → assets → documents → underwriting) with stages 2–5 fanned out in parallel and AHFC-406 recovery via stored `fallback_case_id` — exactly one audit row marked `recovered: true`, never a duplicate at BHN."
      - Federated UAT deploy — each app repo builds to ECR and fires a `repository_dispatch` event at the ops repo, which runs `docker compose` behind one nginx with a SAN TLS cert; ops repo holds no application code.
    architecture:
      nodes:
        - { id: client,  label: lender app,    type: client,    hint: [-1.4,  0.0, 0] }
        - { id: gateway, label: gateway,       type: service,   hint: [-0.6,  0.2, 0] }
        - { id: push,    label: partner-push,  type: service,   hint: [ 0.4,  0.6, 0] }
        - { id: valkey,  label: valkey,        type: datastore, hint: [ 0.4, -0.6, 0] }
        - { id: pg,      label: postgres,      type: datastore, hint: [ 1.2,  0.2, 0] }
        - { id: lambda,  label: lambda-triage, type: external,  hint: [-0.6, -0.8, 0] }
      edges:
        - { from: client,  to: gateway, label: "POST /apply",     kind: sync }
        - { from: gateway, to: valkey,  label: "rate.limit",      kind: sync }
        - { from: gateway, to: pg,      label: "CHECK + trigger", kind: sync }
        - { from: gateway, to: push,    label: "enqueue",         kind: async }
        - { from: push,    to: pg,      label: "durable_id",      kind: sync }
        - { from: lambda,  to: gateway, label: "mail.classified", kind: event }
    accent: lime

  - slug: quason
    name: Fleet Management — Quason
    tagline: VDA 5050 backbone for 100+ AMRs with a Blockly workflow editor
    stack: [NestJS, RabbitMQ, MQTT, Redis, Blockly, Docker]
    problem: >-
      Warehouse AMR fleets need two contradictory things at once: sub-100ms
      command latency (or robots crash into each other) and durable task
      delivery (or you lose pickups during a broker restart). On top of
      that, ops teams have to compose multi-step missions — pickup at
      A, swing through a gate that needs a human to unlock it, loop a
      replenishment circuit — without writing code. Existing setups
      picked one transport problem and bolted on a worse version of the
      other; mission authoring meant a developer ticket every time.
    approach: >-
      Split the transport: MQTT for low-latency real-time command/
      telemetry, RabbitMQ topic routing for durable task hand-off, with
      zone-based assignment and a small collision-avoidance protocol in
      the orchestrator. The whole control plane runs on MQTT. On top of
      that I built a Blockly-based dynamic workflow editor so operators
      compose AGV missions visually; a mission compiler converts each
      Blockly graph into VDA 5050 instructions the AGVs can execute.
      Complex primitives are first-class — selectable stops, conditional
      loops, and non-AGV action nodes (a human "unlock the gate" step
      pauses the mission until the action callback returns). A
      hardware-agnostic AGV simulator runs the same VDA 5050 envelope as
      production so the full fleet can be regression-tested in CI
      without booking a real robot.
    result: >-
      Sustained 10,000+ msgs/sec with zero message loss in a 24-hour
      soak. Live telemetry dashboard for 100+ robots with sub-second
      update latency. 70% less physical-device QA, three days off the
      release cycle, 28% drop in production bugs. Ops compose new
      missions in the Blockly editor without engineering involvement.
    bullets:
      - Real-time AMR communication backbone with MQTT broker + RabbitMQ topic routing — 10K+ msgs/sec, zero message loss across a 24-hour soak.
      - Blockly-based dynamic workflow editor so operations compose AGV missions visually instead of filing engineering tickets.
      - VDA 5050 mission compiler converts each Blockly workflow into hardware-agnostic AGV instructions every compliant robot can execute.
      - Complex workflow primitives — selectable stops, conditional loops, non-AGV actions (e.g. "unlock the gate") that pause the mission until a human callback returns.
      - Zone-based task assignment and a collision-avoidance protocol baked into the orchestrator for dynamic routing across the fleet.
      - Live telemetry dashboard streaming battery, position and state for 100+ robots with sub-second update latency.
      - Hardware-agnostic AGV simulator running the same VDA 5050 envelope as production — full regression testing in CI without physical devices, cut QA cycle by 3 days.
    architecture:
      nodes:
        - { id: orch,   label: orchestrator, type: service,   hint: [ 0.0,  0.0, 0] }
        - { id: broker, label: mqtt-broker,  type: queue,     hint: [ 0.0,  0.8, 0] }
        - { id: rmq,    label: rabbitmq,     type: queue,     hint: [ 0.0, -0.8, 0] }
        - { id: amr1,   label: amr-001,      type: external,  hint: [-1.3,  0.6, 0] }
        - { id: amr2,   label: amr-002,      type: external,  hint: [-1.3, -0.6, 0] }
        - { id: amr3,   label: amr-003,      type: external,  hint: [ 1.3,  0.6, 0] }
        - { id: amr4,   label: amr-004,      type: external,  hint: [ 1.3, -0.6, 0] }
        - { id: tele,   label: telemetry-db, type: datastore, hint: [ 1.6,  0.0, 0] }
      edges:
        - { from: amr1,   to: broker, label: state,   kind: event }
        - { from: amr2,   to: broker, label: state,   kind: event }
        - { from: amr3,   to: broker, label: state,   kind: event }
        - { from: amr4,   to: broker, label: state,   kind: event }
