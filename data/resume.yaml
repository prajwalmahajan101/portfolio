  - slug: synthia
    name: AI Legal Assistant — Synthia
    tagline: RAG + agent-flow contract analysis with a Word plugin that edits the document for you
    stack: [Python, FastAPI, LangChain, GPT-4, Celery, Redis]
    problem: >-
      Legal teams skim hundred-page contracts looking for the half-dozen
      clauses that actually changed. A naive LLM call hallucinates or
      misses citations entirely; a naive search misses the semantic
      match; and even a correct suggestion is useless if the lawyer has
      to manually paste it back into Word. Both Q&A and editing have to
      be solved together, at scale, without redeploying every time the
      prompt drifts.
    approach: >-
      Built a full RAG pipeline — contract ingestion → semantic chunking
      → vector embedding → clause-level Q&A with chain-of-thought
      reasoning so each answer cites the clause it came from. Wrapped
      the RAG retrieval in a LangChain agent flow: the agent plans the
      analysis, calls retrieval and comparison tools step by step, and
      reasons about which clauses to surface for redline. Built a Word
      plugin (Office.js) so the same agent can act inside Word — its
      function-calling tools hit Word's exposed APIs to insert
      suggestions, add comments and resolve redlines directly in the
      document. A document-comparison engine highlights clause-level
      diffs between contract versions. A Celery-based async batch
      processor handles 500-page documents without blocking the API. A
      Redis-backed prompt vault holds 200+ GPT-4-generated templates,
      versioned and refined via a reinforced-learning feedback loop from
      legal reviewers — so the team iterates copy without a redeploy.
    result: >-
      Clause-level Q&A with high factual accuracy and grounded citations.
      Multi-stage prompt engineering with chain-of-thought reasoning for
      redlining and risk identification. Document comparison engine with
      structured change summaries. Word plugin lets the agent edit
      contracts in place; reinforced-learning loop on the prompt vault
      keeps accuracy improving review by review — automated about 10%
      of manual legal workflows.
    bullets:
      - RAG pipeline for contract ingestion, semantic chunking, vector embedding and clause-level Q&A with grounded clause citations.
      - LangChain agent flow with chain-of-thought reasoning — the agent plans the analysis, calls retrieval and comparison tools step by step.
      - Word plugin (Office.js) where the agent uses function-calling tools against Word's exposed APIs to insert suggestions, add comments and resolve redlines directly in the document.
      - Document comparison engine highlighting clause-level diffs between contract versions for fast redline review.
      - Celery-based async batch processing handling documents up to 500 pages without blocking the API.
      - Redis-backed prompt vault — 200+ GPT-4-generated templates, versioned and tunable by the legal team without a redeploy.
      - Reinforced-learning feedback loop on the prompt vault so reviewer corrections steadily improve agent accuracy.
    architecture:
