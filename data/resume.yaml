# -----------------------------------------------------------------------------
# About — extended prose used by src/sections/About.tsx, rendered after the
# shorter profile.summary. Kept separate from `profile.summary` so the Hero
# can stay punchy while the About section gets room to breathe.
# -----------------------------------------------------------------------------
about:
  paragraphs:
    - >-
      I spend most of my time building the parts of a system you don't see —
      the queue that absorbs the spike, the trigger that rejects bad state
      before it lands, the circuit breaker that decides a slow partner is
      really down. Most of my work has been on small teams where one
      engineer owns a service end-to-end, and that ownership is how I
      learnt what a system actually needs to be reliable, not just what it
      needs to ship.
    - >-
      At Optimo Capitals I am the lead architect on roughly half of the
      internal platform — the OptiView dashboard, the five-service
      co-lending mesh, three production Lambda services and a handful of
      ETL pipelines. The thread tying them together is foundation-first
      thinking: a shared resilience kernel each new service inherits,
      correctness invariants pushed into Postgres so no code path can
      bypass them, and security baked into the lowest layer instead of
      bolted on later. Before Optimo I led a three-engineer team at
      Viamagus building the real-time backbone for a hundred-AMR robotic
      fleet, which is where I learnt to design for latency and durability
      at the same time.

