services:
  portfolio-web:
    image: nginx:alpine
    container_name: portfolio-web
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - npm_net

networks:
  npm_net:
    external: true
    name: niginx_proxy_manager_default
