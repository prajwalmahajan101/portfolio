<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />

    <meta property="og:title" content="Prajwal Mahajan — Senior Backend Engineer" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply the persisted theme before React mounts to avoid a flash of the
      // wrong palette on reload. Mirrors theme-provider's storage key + default.
      (function () {
        try {
          var t = localStorage.getItem('portfolio-theme');
          document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        } catch (_) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
